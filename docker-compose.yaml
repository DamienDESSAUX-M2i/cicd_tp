name: cicd_tp

services:
  vote:
    container_name: vote
    build: ./vote
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - 8080:80
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - network_frontend
      - network_backend

  result:
    container_name: result
    build: ./result
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - 5001:4000
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - network_backend

  worker:
    container_name: worker
    build: ./worker
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - network_backend
  
  redis:
    container_name: redis
    image: redis:5.0-alpine3.10
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - volume_redis:/data
    networks:
      - network_backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    container_name: db
    image: postgres:9.4
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - volume_db:/var/lib/postgresql
    networks:
      - network_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  volume_redis:
  volume_db:

networks:
  network_frontend:
  network_backend: